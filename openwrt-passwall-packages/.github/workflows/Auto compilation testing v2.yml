name: Auto compilation testing v2

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - '.github/**'
env:
  TZ: Asia/Shanghai

jobs:
  job_auto_compile:
    runs-on: ubuntu-latest
    name: Build ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        # 使用 -snapshot 后缀拉取最新的滚动开发版 SDK 镜像
        arch:
          - x86-64-snapshot
          - rockchip-armv8-snapshot
          - mvebu-cortexa53-snapshot
          - mvebu-cortexa72-snapshot
          - at91-sama5-snapshot
          - mediatek-mt7629-snapshot
          - sunxi-cortexa7-snapshot
          - sunxi-cortexa8-snapshot
          - bcm53xx-generic-snapshot
          - zynq-generic-snapshot
          - mvebu-cortexa9-snapshot
          - ipq806x-generic-snapshot
          - ath79-generic-snapshot
          - realtek-rtl838x-snapshot
          - ramips-rt288x-snapshot
          - ramips-rt3883-snapshot
          - bcm47xx-generic-snapshot

    steps:
      - name: Checkout code
        uses: actions/checkout@main
        with:
          fetch-depth: 0 

      - name: Detect Changed Packages
        id: detect-changes
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA=$(git merge-base refs/remotes/origin/${{ github.base_ref }} ${{ github.event.pull_request.head.sha }})
            HEAD_SHA=${{ github.event.pull_request.head.sha }}
            echo "Detected PR event."
          else
            BASE_SHA=${{ github.event.before }}
            HEAD_SHA=${{ github.event.after }}
            echo "Detected Push event."
          fi
          
          
          CHANGED_PKGS=$(git diff --name-only $BASE_SHA $HEAD_SHA | awk -F'/' '{print $1}' | sort -u | grep -v '^\.' | tr '\n' ' ')
          
          echo "Changed packages: $CHANGED_PKGS"
          
          
          if [ -z "$(echo $CHANGED_PKGS | tr -d ' ')" ]; then
            echo "SKIP_BUILD=true" >> $GITHUB_ENV
            echo "No package changes detected, skipping build."
          else
            echo "SKIP_BUILD=false" >> $GITHUB_ENV
            echo "PACKAGES=$CHANGED_PKGS" >> $GITHUB_ENV
          fi

      - name: Build packages with Official OpenWrt SDK
        if: env.SKIP_BUILD == 'false'
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}
          FEEDNAME: passwall_packages
          PACKAGES: ${{ env.PACKAGES }}
          V: s